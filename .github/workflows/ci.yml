name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    timeout-minutes: 30

    env:
      DESTINATION: platform=iOS Simulator,name=iPhone 16,OS=latest
      SCHEME: PainterApp

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain versions and available simulators
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list runtimes
          xcrun simctl list devices available iPhone

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SwiftPM dependencies
        run: xcodebuild -resolvePackageDependencies -scheme "$SCHEME"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO
